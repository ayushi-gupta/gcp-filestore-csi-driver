apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gcp-filestore-csi-node
  namespace: gcp-filestore-csi-driver
spec:
  template:
    spec:
      imagePullSecrets:
      - name: gcr-json-key
      # Add gVisor runtime toleration so the CSI Node DaemonSet schedules on sandboxed nodes
      tolerations:
      - key: "sandbox.gke.io/runtime"
        operator: "Equal"
        value: "gvisor"
        effect: "NoSchedule"
